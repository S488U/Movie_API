        .movie-poster {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .fav-style {
            border-radius: 999px;
            padding: 0.5%;
            background-color: rgba(255, 255, 255, 0.726) !important;
            position: absolute;
            top: 23%;
            right: 10%;
            cursor: pointer;
            user-select: none ;
            display: inline-block;
        }

        .fav-style svg {
            transform: translateY(0);
            transition: transform 200ms ease-in-out;
            &:hover {
                filter: drop-shadow(rgba(0, 0, 0, 0.1) 0px 4px 12px);
                transform: translateY(-4px);
            }
        }

        @media screen and (max-width: 600px) {
            .second {
                padding: 43px;
            }

            .fav-style {
                padding: 2% !important;
                position: fixed !important;
            }
        }
